env_id: "InterviewEnv"
name: "InterviewEnv"
version: "1.1.0"
description: "Resume-optional adaptive RL-style interview environment with structured actions, trend-aware rewards, deterministic graders, and typed OpenEnv API models."
entrypoint: "api.main:app"
runtime: "docker"
authors:
  - "Kottakki Sai Srija"

tasks:
  - id: easy
    name: "Basic Interview Simulation"
    difficulty: easy
    description: "Simulates a low-pressure interview where the agent answers fundamental questions and builds confidence through early-stage feedback."
    max_steps: 3
    success_threshold: 0.78
    grader: "graders.grade_easy"
  - id: medium
    name: "Technical Interview Simulation"
    difficulty: medium
    description: "Agent must provide structured, well-reasoned answers including tradeoffs, clarity, and technical depth across multiple turns."
    max_steps: 4
    success_threshold: 0.80
    grader: "graders.grade_medium"
  - id: hard
    name: "Adaptive Stress Interview"
    difficulty: hard
    description: "Environment dynamically adapts difficulty based on agent performance, testing consistency, improvement, and ability to handle pressure."
    max_steps: 5
    success_threshold: 0.82
    grader: "graders.grade_hard"

schemas:
  action:
    model: "models.ActionModel"
    type: object
    additionalProperties: false
    fields:
      answer:
        type: string
        required: false
        description: "Candidate answer text. Existing clients may send only this field."
      message:
        type: string
        required: false
        description: "Backward-compatible alias for answer."
      answer_strategy:
        type: string
        enum: ["direct", "detailed", "structured", "concise", "default", "clarify", "skip"]
        required: false
        default: "detailed"
        description: "Structured RL action controlling answer style."
      confidence_level:
        type: integer
        minimum: 1
        maximum: 5
        required: false
        default: 3
        description: "Self-reported confidence."
      confidence:
        type: number
        minimum: 0.0
        maximum: 1.0
        required: false
        default: 0.5
        description: "Continuous confidence alias used for reward shaping."
      strategy:
        type: string
        enum: ["direct", "detailed", "structured", "concise", "default", "clarify", "skip"]
        required: false
        default: "default"
        description: "Strategy alias for decision-based actions."
      tone:
        type: string
        enum: ["neutral", "confident", "collaborative", "defensive"]
        required: false
        default: "neutral"
        description: "Delivery tone that affects stress/adaptivity."
  observation:
    model: "models.ObservationModel"
    type: object
    fields:
      task_id: string
      difficulty: string
      current_difficulty: integer
      turn: integer
      max_turns: integer
      prompt: string
      current_question: string
      question: string
      done: boolean
      last_answer: string
      quality_label: string
      behavioral_feedback: object
      follow_up_question: string
      adaptive_reason: string
      stress_level: number
      adaptivity_factor: number
      score_trend: string
      reward_breakdown: object
      performance_history: array
      last_action: object
      learning_metrics: object
  state:
    model: "models.StateModel"
    type: object
    fields:
      task_id: string
      difficulty: string
      current_difficulty: integer
      turn: integer
      max_turns: integer
      prompt: string
      current_question: string
      question: string
      done: boolean
      history: array
      qa_history: array
      question_history: array
      resume_text: string
      parsed_resume_data: object
      last_feedback: object
      performance_history: array
      score_history: array
      score_trend: string
      stress_level: number
      adaptivity_factor: number
      reward_breakdown: object
      last_action: object
      learning_metrics: object
      score: number
      success: boolean
      quality_label: string
      behavioral_feedback: object
      adaptive_reason: string
  metadata:
    model: "models.MetadataModel"
    type: object

graders:
  easy: "graders.grade_easy"
  medium: "graders.grade_medium"
  hard: "graders.grade_hard"

reward:
  type: float
  range: [0.0, 1.0]
  partial_credit: true
  formula: "shaped_reward = task_weight * (base_reward + 0.2 * positive_improvement + strategy_bonus + confidence_bonus + consistency_bonus - repetition_penalty); cumulative_score += shaped_reward"
  components:
    correctness: "Question/task relevance, resume match when available, and STAR/technical rubric evidence."
    clarity: "Structure, coherence, and relevance from deterministic feedback analysis."
    confidence: "Decisive language and authority without overclaiming."
    consistency: "Penalty for volatile reward history across recent turns."
    improvement: "Bonus for improving over the previous reward signal."
    confidence_alignment: "Agreement between self-reported confidence_level and observed confidence."
    action_strategy: "Rewards appropriate structured action choices; skip is penalized."
    repetition_penalty: "Penalizes repeated answers from the recent QA memory."
    cumulative_learning: "State exposes average_score, total_score, turns_taken, and per-answer score_history."
  termination: "Episode terminates when average_score >= task success_threshold after at least two turns or turn >= max_steps."

api:
  reset:
    method: "GET"
    path: "/reset"
    response_model: "models.StateModel"
  reset_post:
    method: "POST"
    path: "/reset"
    request_model: "models.ResetRequest"
    response_model: "models.StateModel"
  step:
    method: "POST"
    path: "/step"
    request_model: "models.ActionModel"
    response_model: "models.StepResponseModel"
  state:
    method: "GET"
    path: "/state"
    response_model: "models.StateModel"
  metadata:
    method: "GET"
    path: "/metadata"
    response_model: "models.MetadataModel"
  upload_resume:
    method: "POST"
    path: "/upload_resume"
    request: "multipart/form-data file"
    response_model: "models.StateModel"

inference: "inference.py"
launch: "launch.sh"
