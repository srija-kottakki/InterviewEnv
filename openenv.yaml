env_id: "InterviewEnv"
name: "InterviewEnv"
version: "1.0.0"
description: "Meta OpenEnv Round 1 interview-answer environment with typed models, deterministic graders, and optional UI."
entrypoint: "api.main:app"
runtime: "docker"
authors:
  - "Kottakki Sai Srija"

tasks:
  - id: easy
    name: "Keyword detection in an interview answer"
    difficulty: easy
    description: "Detect whether the answer includes role-relevant interview keywords."
    max_steps: 2
    success_threshold: 0.55
    grader: "graders.grade_easy"
  - id: medium
    name: "Classify answer quality"
    difficulty: medium
    description: "Classify interview answer quality as poor, average, or good using structure and specificity."
    max_steps: 3
    success_threshold: 0.65
    grader: "graders.grade_medium"
  - id: hard
    name: "Open-ended behavioral rubric evaluation"
    difficulty: hard
    description: "Evaluate a behavioral interview answer on STAR structure, evidence, impact, and reflection."
    max_steps: 4
    success_threshold: 0.72
    grader: "graders.grade_hard"

schemas:
  action:
    model: "models.ActionModel"
    type: object
    fields:
      answer:
        type: string
        required: true
      message:
        type: string
        required: false
  observation:
    model: "models.ObservationModel"
    type: object
    fields:
      task_id: string
      difficulty: string
      current_difficulty: integer
      turn: integer
      max_turns: integer
      prompt: string
      current_question: string
      done: boolean
      last_answer: string
      quality_label: string
      behavioral_feedback: object
      adaptive_reason: string
      follow_up_question: string
  state:
    model: "models.StateModel"
    type: object
    fields:
      task_id: string
      difficulty: string
      current_difficulty: integer
      turn: integer
      max_turns: integer
      prompt: string
      current_question: string
      done: boolean
      history: array
      qa_history: array
      question_history: array
      score: float
      success: boolean
      quality_label: string
      behavioral_feedback: object
      adaptive_reason: string
      resume_text: string
      parsed_resume_data: object
      last_feedback: object
  metadata:
    model: "models.MetadataModel"
    type: object

graders:
  easy: "graders.grade_easy"
  medium: "graders.grade_medium"
  hard: "graders.grade_hard"

reward:
  type: float
  range: [0.0, 1.0]
  formula: "reward = grader_score; grader_score is calibrated from clarity, confidence, relevance, resume match, and rubric evidence"
  partial_credit: true
  termination: "Episode terminates on success or after max_steps."

api:
  reset:
    method: "GET"
    path: "/reset"
    response_model: "models.StateModel"
  reset_post:
    method: "POST"
    path: "/reset"
    request_model: "models.ResetRequest"
    response_model: "models.StateModel"
  step:
    method: "POST"
    path: "/step"
    request_model: "models.ActionModel"
    response_model: "models.StepResponseModel"
  state:
    method: "GET"
    path: "/state"
    response_model: "models.StateModel"
  metadata:
    method: "GET"
    path: "/metadata"
    response_model: "models.MetadataModel"
  upload_resume:
    method: "POST"
    path: "/upload_resume"
    request: "multipart/form-data file"
    response_model: "models.StateModel"

inference: "inference.py"
launch: "launch.sh"
