name: InterviewEnv
version: "1.0.0"
description: "API-only OpenEnv environment for deterministic interview-answer evaluation."
entrypoint: main:app
runtime: docker

tasks:
  - id: easy
    name: "Basic interview question answering"
    difficulty: easy
    description: "Answer a single introductory interview question with relevant details."
    max_turns: 2
    pass_threshold: 0.55
    grader: env.graders.grade_easy
  - id: medium
    name: "Multi-turn follow-up reasoning"
    difficulty: medium
    description: "Answer follow-up interview questions with structured reasoning and adaptation."
    max_turns: 3
    pass_threshold: 0.62
    grader: env.graders.grade_medium
  - id: hard
    name: "Behavioral STAR-format interview simulation"
    difficulty: hard
    description: "Use situation, task, action, and result structure for behavioral interview answers."
    max_turns: 4
    pass_threshold: 0.70
    grader: env.graders.grade_hard

action_space:
  type: object
  model: env.models.InterviewAction
  fields:
    message:
      type: string
      description: "Candidate answer for the current interview prompt."

observation_space:
  type: object
  model: env.models.InterviewState
  fields:
    task_id:
      type: string
    difficulty:
      type: string
    turn:
      type: integer
    max_turns:
      type: integer
    prompt:
      type: string
    history:
      type: array
    done:
      type: boolean

reward:
  type: float
  range: [0.0, 1.0]
  function: "reward equals deterministic task grader score for the latest answer."

api:
  reset:
    method: GET
    path: /reset
    response: '{"state": {...}, "info": {...}}'
  reset_post:
    method: POST
    path: /reset
    response: '{"state": {...}, "info": {...}}'
  step:
    method: POST
    path: /step
    response: '{"state": {...}, "reward": 0.0, "done": false, "info": {...}}'
  state:
    method: GET
    path: /state
    response: '{"state": {...}}'

deterministic: true
supports_partial_reward: true
baseline: inference.py
