name: InterviewEnv
version: "1.0.0"
description: "OpenEnv Round 1 interview-answer environment with deterministic typed API, graders, and optional UI."
entrypoint: app:app
runtime: docker
author: "Kottakki Sai Srija"
license: MIT
tags:
  - openenv
  - interview
  - evaluation
  - meta-hackathon

environment:
  class: env.env.InterviewEnv
  deterministic: true
  episodic: true
  supports_partial_reward: true

tasks:
  - id: easy
    name: "Basic interview question answering"
    difficulty: easy
    description: "Answer a single introductory interview question with relevant details."
    max_turns: 2
    pass_threshold: 0.55
    grader: graders.grade_easy
  - id: medium
    name: "Multi-turn follow-up reasoning"
    difficulty: medium
    description: "Answer follow-up interview questions with structured reasoning and adaptation."
    max_turns: 3
    pass_threshold: 0.62
    grader: graders.grade_medium
  - id: hard
    name: "Behavioral STAR-format interview simulation"
    difficulty: hard
    description: "Use situation, task, action, and result structure for behavioral interview answers."
    max_turns: 4
    pass_threshold: 0.70
    grader: graders.grade_hard

models:
  action: models.Action
  observation: models.Observation
  metadata: models.Metadata
  reset_response: models.ResetResponse
  step_response: models.StepResponse
  state_response: models.StateResponse

action_space:
  type: object
  model: models.Action
  fields:
    message:
      type: string
      description: "Candidate answer for the current interview prompt."

observation_space:
  type: object
  model: models.Observation
  fields:
    task_id:
      type: string
    difficulty:
      type: string
    turn:
      type: integer
    max_turns:
      type: integer
    prompt:
      type: string
    history:
      type: array
    done:
      type: boolean

reward:
  type: float
  range: [0.0, 1.0]
  source: "grader score for latest action"
  graders:
    easy: graders.grade_easy
    medium: graders.grade_medium
    hard: graders.grade_hard

api:
  reset:
    method: GET
    path: /reset
    query:
      task_id: "easy | medium | hard"
    response: '{"state": {...}, "info": {...}}'
  reset_post:
    method: POST
    path: /reset
    body_model: models.ResetRequest
    response: '{"state": {...}, "info": {...}}'
  step:
    method: POST
    path: /step
    body_model: models.Action
    response: '{"state": {...}, "reward": 0.0, "done": false, "info": {...}}'
  state:
    method: GET
    path: /state
    response: '{"state": {...}}'
  metadata:
    method: GET
    path: /metadata
    response_model: models.Metadata

baseline: inference.py
launch: launch.sh
